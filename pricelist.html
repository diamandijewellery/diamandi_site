<script>
const materials = [
  { key: 'silver', label: 'Silver' },
  { key: 'dental', label: 'Dental Gold' },
  { key: '9k', label: '9ct Gold' },
  { key: '14k', label: '14ct Gold' },
  { key: '18k', label: '18ct Gold' }
];

let currentData = null;
let currentMat = 'silver';

/* ✅ AUTO LOAD TILE IMAGES FROM data-img */
document.querySelectorAll('.tile').forEach(tile => {
  const imgPath = tile.dataset.img;
  const placeholder = tile.querySelector('.tile-img-placeholder');

  if (imgPath && imgPath.trim() !== "") {
    const wrapper = document.createElement('div');
    wrapper.className = 'tile-img';

    const img = document.createElement('img');
    img.src = imgPath;
    img.alt = tile.dataset.name || '';

    wrapper.appendChild(img);

    if (placeholder) {
      placeholder.replaceWith(wrapper);
    }
  }
});

/* ✅ LIGHTBOX */
function openLightbox(el) {
  currentData = el.dataset;
  currentMat = 'silver';

  const imgWrap = document.getElementById('lb-img');

  if (currentData.img && currentData.img.trim() !== "") {
    const newImg = document.createElement('img');
    newImg.className = 'lb-img';
    newImg.id = 'lb-img';
    newImg.src = currentData.img;

    imgWrap.parentNode.replaceChild(newImg, imgWrap);
  } else {
    imgWrap.className = 'lb-img-placeholder';
    imgWrap.id = 'lb-img';
    imgWrap.textContent = '◆';
  }

  document.getElementById('lb-name').textContent = currentData.name;
  document.getElementById('lb-desc').textContent = currentData.desc;

  const matsEl = document.getElementById('lb-mats');
  matsEl.innerHTML = '';

  materials.forEach(m => {
    const isNull = currentData[m.key] === 'null' || !currentData[m.key];

    const btn = document.createElement('button');
    btn.className = 'lb-mat-btn' + (m.key === 'silver' ? ' active' : '');
    btn.textContent = m.label;

    if (isNull) btn.style.opacity = '0.35';

    btn.onclick = () => selectMat(m.key, btn);
    matsEl.appendChild(btn);
  });

  updatePrice('silver');

  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function selectMat(key, btn) {
  document.querySelectorAll('.lb-mat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentMat = key;
  updatePrice(key);
}

function updatePrice(key) {
  const val = currentData[key];
  const priceEl = document.getElementById('lb-price');
  const unavailEl = document.getElementById('lb-unavail');

  if (!val || val === 'null') {
    priceEl.textContent = '';
    unavailEl.style.display = 'block';
  } else {
    priceEl.textContent = '£' + val;
    unavailEl.style.display = 'none';
  }
}

/* ✅ CLOSE FUNCTIONS */
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

function closeLightboxOutside(e) {
  if (e.target === document.getElementById('lightbox')) closeLightbox();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeLightbox();
});

/* ✅ MOBILE MENU */
function openMenu() {
  document.getElementById('mobile-menu').classList.add('open');
}

function closeMenu() {
  document.getElementById('mobile-menu').classList.remove('open');
}
</script>
